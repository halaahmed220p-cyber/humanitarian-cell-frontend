<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <meta name="viewport" content="width=1200" />
    <title>hac-project</title>

    <!-- إخفاء أشرطة وعناصر الترجمة العلوية المزعجة قسراً دون منع وظيفة الترجمة نفسها -->
    <style>
      /* إخفاء الشريط العلوي والفقاعات العائمة لـ Google Translate */
      .goog-te-banner-frame,
      .skiptranslate,
      #goog-gt-tt,
      .goog-te-balloon-part,
      .VIpgJd-yDge-VIpgJd {
        display: none !important;
      }
      
      body {
        top: 0px !important;
        position: static !important;
      }

      /* إخفاء أداة جوجل الافتراضية المنسدلة إن وجدت */
      .goog-te-gadget {
        height: 0 !important;
        overflow: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- عنصر ترجمة جوجل -->
    <div id="google_translate_element" style="display:none;"></div>

    <!-- سكريبت ترجمة جوجل المصحح -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'ar',
          includedLanguages: 'ar,en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
